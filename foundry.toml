[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = true
# Reference implementation — deliberately dependency-free so each contract
# can be audited in isolation without pulling external libraries.

[rpc_endpoints]
# Robinhood Chain mainnet (chainId 4663) and a local anvil fork of it.
rh = "https://rpc.mainnet.chain.robinhood.com"
rh_fork = "http://127.0.0.1:8546"

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
